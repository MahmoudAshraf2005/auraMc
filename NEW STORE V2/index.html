<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>AuraMC | Store</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      color: white;
    }
    /* خلفية الفيديو */
    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -2;
      object-fit: cover;
    }
    /* Overlay لتعتيم الفيديو */
    #bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      z-index: -1;
    }
    a{
      color: white!important;
      font-size: 20px!important;
    }
    nav{
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      backdrop-filter: blur(10px);
      top: 10px;
      position: sticky;
      padding: 8px 20px!important;
    }
    section{
      height: calc(100vh - 70px);
    }
    section > p{
      font-size: 40px;
      font-weight: bold;
    }
    .row{
      width: 70%;
    }
    .box{
      background-color: rgba(255, 255, 255, 0.05);
      padding: 16px 20px 30px 20px;
      margin-top: 5px;
      border-radius: 6px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: 0.2s;
    }
    .box:hover{
      border: 1px solid rgba(0, 255, 0, 0.3);
      box-shadow: 0 0 5px 2px rgba(0, 255, 0, 0.5);
    }
    .box > p{
      font-size: 20px;
      color: #00ff95;
      font-weight: bold;
    }
    .navbar-toggler {
      outline: none!important;
      border: 1px solid white; 
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba%28255, 255, 255, 1%29' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
    }
    .srvImg{
      width: 30px;
      scale: 2;
    }
  </style>
</head>
<body>
  <!-- الفيديو -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="https://r2.guns.lol/dcd0e93e-a503-4743-941e-815433cb2be5.mp4" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>

  <div class="container">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"><img class="srvImg" src="images/server.png" alt=""></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="ranks.html">RANKS</a>
            </li>
            <li class="nav-item">
              <a class="nav-link ms-sm-0 ms-md-0" href="store.html">STORE</a>
            </li>
            <li class="nav-item">
              <a class="nav-link ms-4 ms-sm-0 ms-md-0" href="https://discord.gg/WZxpKeJXYb" target="_blank">SUPPORT</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <section class="d-flex justify-content-center align-items-center flex-column">
    <p class="text-white">أفضل سيرفر ماينكرافت عربي</p>
    <div class="row mt-5">
      <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="box">
          <p>Server Stats :</p>
          <p id="server-stats">جارٍ التحميل...</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="box">
          <p>Online Players :</p>
          <p id="online-players">-- / --</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="box">
          <p>IP :</p>
          <p id="ip">5.231.46.229</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="box">
          <p>Port :</p>
          <p id="port">25567</p>
        </div>
      </div>
    </div>
  </section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const ip = "AuraMc.pro";
  const port = "25566";
  const apiURL = `https://api.mcsrvstat.us/2/${ip}:${port}`;

  fetch(apiURL)
  .then(response => response.json())
  .then(data => {
    const serverStatusEl = document.getElementById('server-stats');
    const onlinePlayersEl = document.getElementById('online-players');

    if(data.online){
      // Server Online
      serverStatusEl.innerText = "Online";
      serverStatusEl.style.color = "#00ff95"; // أخضر
      const online = data.players && data.players.online ? data.players.online : 0;
      const max = data.players && data.players.max ? data.players.max : 0;
      onlinePlayersEl.innerText = `${online} / ${max}`;
      onlinePlayersEl.style.color = "#00ff95"; // أخضر
    } else {
      // Server Offline
      serverStatusEl.innerText = "Offline";
      serverStatusEl.style.color = "#ff4d4d"; // أحمر
      onlinePlayersEl.innerText = "-- / --";
      onlinePlayersEl.style.color = "#ff4d4d"; // أحمر
    }

    // IP & Port
    document.getElementById('ip').innerText = ip;
    document.getElementById('port').innerText = port;
  })
  .catch(err => {
    console.error("API Error:", err);
    const serverStatusEl = document.getElementById('server-stats');
    const onlinePlayersEl = document.getElementById('online-players');
    serverStatusEl.innerText = "Offline";
    serverStatusEl.style.color = "#ff4d4d"; // أحمر
    onlinePlayersEl.innerText = "-- / --";
    onlinePlayersEl.style.color = "#ff4d4d"; // أحمر
  });

</script>
</body>
</html>
